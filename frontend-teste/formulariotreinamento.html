<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Treinamento - Teste</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7f4ef; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #c4151f; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { background-color: #c4151f; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:hover { background-color: #8B1A1A; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cadastrar Novo Treinamento</h2>
    <form id="formCadastro">
        <div class="form-group">
            <label>Tema do Treinamento</label>
            <input type="text" id="tema" placeholder="Ex: Técnicas de Vendas" required>
        </div>
        
        <div class="form-group">
            <label>Data (Formato: dd/mm/aaaa)</label>
            <input type="text" id="data" placeholder="10/05/2026" required>
        </div>

        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Horário Início</label>
                <input type="text" id="horario_inicio" placeholder="14:00" required>
            </div>
            <div style="flex: 1;">
                <label>Horário Fim</label>
                <input type="text" id="horario_fim" placeholder="16:00" required>
            </div>
        </div>

        <div class="form-group">
            <label>Segmento Alvo (Público)</label>
            <input type="text" id="segmento" placeholder="Ex: Gerentes, Lojistas..." required>
        </div>

        <div class="form-group">
            <label>Conteúdo / Descrição</label>
            <textarea id="conteudo" rows="3" placeholder="Descreva os tópicos do treinamento..."></textarea>
        </div>

        <button type="submit" class="btn">Salvar Treinamento</button>
    </form>
</div>

<script>
    document.getElementById("formCadastro").addEventListener("submit", function(event) {
        event.preventDefault(); // Evita recarregar a página

        // Monta o JSON igual ao que você testou no Thunder Client
        const dados = {
            tema: document.getElementById("tema").value,
            descricao: "Descrição padrão de teste",
            categoria: "Geral",
            data: document.getElementById("data").value,
            horario_inicio: document.getElementById("horario_inicio").value,
            horario_fim: document.getElementById("horario_fim").value,
            local: "Auditório Principal",
            modalidade: "Presencial",
            conteudo: document.getElementById("conteudo").value,
            capacidade_maxima: 50,
            segmento_alvo: document.getElementById("segmento").value,
            status: "Agendado", // Conforme padrão das regras
            objetivo: "Aumentar vendas",
            observacoes: "Levar lista de presença",
            material_apoio: "Nenhum",
            responsavel: "Admin",
            area_responsavel: "Treinamentos",
            tags: "teste",
            recorrente: false
        };

        // Envia para o Back-end em Go
        fetch("http://localhost:8080/api/treinamentos/cadastrar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dados)
        })
        .then(response => {
            if (response.status === 201) {
                alert("Sucesso! Treinamento salvo no Supabase.");
                window.location.href = "lista.html"; // Vai para a tela de lista
            } else {
                alert("Ocorreu um erro ao salvar (Verifique o terminal do Go).");
            }
        })
        .catch(error => console.error("Erro na requisição:", error));
    });
</script>

</body>
</html>
